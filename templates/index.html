<!DOCTYPE html>
<html>
<head>
  <title>Phishing Detection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('/static/images/Real-Time Resilience_ Strengthening Your Cybersecurity Against Phishing.jpg') no-repeat center center/cover;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin-bottom: 20px;
      text-shadow: 1px 1px 3px #000;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: none;
      margin-bottom: 10px;
    }

    .button {
      background: #a44;
      padding: 10px 20px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    form {
      background-color: rgba(0, 0, 0, 0.5); /* semi-transparent box */
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>URL PHISHING DETECTION SYSTEM</h1>

  <form action="/check" method="POST">
    <input type="text" name="url" placeholder="Masukkan URL" required><br>
    <button type="submit" class="button">CHECK IT NOW</button>
  </form>
</body>
</html>
